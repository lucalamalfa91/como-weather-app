name: Deploy to Vercel + Railway

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: generated_app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: generated_app/frontend
        run: npm ci

      - name: Build frontend
        working-directory: generated_app/frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: generated_app/frontend
          vercel-args: '--prod'

  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: generated_app/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: generated_app/backend
        run: dotnet restore

      - name: Build
        working-directory: generated_app/backend
        run: dotnet build --configuration Release --no-restore

      - name: Test
        working-directory: generated_app/backend
        run: dotnet test --no-build --verbosity normal || echo "No tests found"

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: generated_app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: generated_app/frontend
        run: npm ci

      - name: Run linter
        working-directory: generated_app/frontend
        run: npm run lint || echo "No linter configured"

      - name: Run tests
        working-directory: generated_app/frontend
        run: npm test || echo "No tests configured"
